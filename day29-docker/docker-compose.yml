version: "3.9"

services:
  db:
    image: postgres:16-alpine
    container_name: go_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: gouser
      POSTGRES_PASSWORD: gopass
      POSTGRES_DB: golearn
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gouser -d golearn"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: go_app
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      APP_PORT: 8080
      APP_ENV: production
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: gouser
      DB_PASSWORD: gopass
      DB_NAME: golearn
      JWT_SECRET: your-production-secret
      JWT_EXPIRY_HOURS: 24
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
